animations {
    enabled = true

    # Animation curves
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0, 1, 0, 1
    bezier = emphasizedDecel, 1, 0, 1, 0
    bezier = standard, 0.2, 0, 0, 1

    # Animation configs
    animation = layersIn, 1, 5, emphasizedAccel, slide
    animation = layersOut, 1, 4, emphasizedDecel, slide
    animation = fadeLayers, 1, 5, standard

    animation = windowsIn, 1, 5, emphasizedAccel
    animation = windowsOut, 1, 5, emphasizedDecel
    animation = windowsMove, 1, 6, standard
    animation = workspaces, 1, 5, standard, slidefade 4%

    animation = specialWorkspaceIn, 1, 4, specialWorkSwitch, slidefadevert top 15%
    animation = specialWorkspaceOut, 1, 4, specialWorkSwitch, slidefadevert bottom 15%

    animation = fade, 1, 6, standard
    animation = fadeIn, 1, 10, standard
    animation = fadeOut, 1, 5, standard
    animation = fadeDim, 1, 6, standard
    animation = border, 1, 6, standard
}
